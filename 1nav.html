<!-- ══ NAV CARTA LIMA SUR — RESPONSIVO ══ -->
<style>
  *{ box-sizing: border-box; margin: 0; padding: 0; }

  .ls-nav {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 7;
    min-height: 240px;
    max-height: 420px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: block;
  }
  .ls-nav__bg {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 40%;
    display: block;
  }
  .ls-nav__overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.18) 0%,
      rgba(0,0,0,0.45) 50%,
      rgba(0,0,0,0.86) 100%
    );
  }
  .ls-nav__inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: clamp(10px, 3vw, 22px) clamp(12px, 4vw, 32px) clamp(12px, 3vw, 22px);
  }
  .ls-nav__logo {
    width: clamp(80px, 14vw, 130px);
    height: clamp(80px, 14vw, 130px);
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
  }
  .ls-nav__center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .ls-nav__badge {
    display: inline-block;
    background: #c8102e;
    color: #fff;
    font-size: clamp(8px, 1.4vw, 11px);
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: 20px;
  }
  .ls-nav__title {
    font-size: clamp(18px, 4.5vw, 36px);
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    text-align: center;
    text-shadow: 0 2px 10px rgba(0,0,0,0.55);
    line-height: 1.1;
  }
  .ls-nav__pills {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: clamp(5px, 1vw, 8px);
    width: 100%;
  }
  .ls-nav__pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.13);
    border: 1px solid rgba(255,255,255,0.32);
    color: #fff;
    font-size: clamp(9px, 1.5vw, 12px);
    font-weight: 700;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    padding: clamp(5px,1vw,7px) clamp(9px,1.8vw,14px);
    border-radius: 20px;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.18s, border-color 0.18s;
  }
  .ls-nav__pill:hover {
    background: rgba(200,16,46,0.8);
    border-color: #c8102e;
  }

  /* ── LOGO FLOTANTE STICKY ── */
  .logo-sticky {
    position: fixed;
    bottom: 28px;
    right: 20px;
    z-index: 999;
    width: clamp(52px, 8vw, 72px);
    height: clamp(52px, 8vw, 72px);
    background: rgba(8,8,8,0.75);
    border: 1px solid rgba(212,160,23,0.35);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(16px) scale(0.9);
    transition: opacity 0.3s ease, transform 0.3s ease, border-color 0.2s;
    pointer-events: none;
  }
  .logo-sticky.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .logo-sticky:hover {
    border-color: rgba(212,160,23,0.8);
    background: rgba(20,20,20,0.9);
  }
  .logo-sticky img {
    width: 68%;
    height: 68%;
    object-fit: contain;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
  }
</style>

<!-- NAV PRINCIPAL -->
<nav class="ls-nav" id="inicio" role="navigation" aria-label="Carta Lima Sur">
  <img class="ls-nav__bg"
    src="https://raw.githubusercontent.com/digitalmenteepro-cell/cartalimasur.cl/refs/heads/main/imagenes/Nav%20lima%20sur.jpg"
    alt="" aria-hidden="true" loading="eager">
  <div class="ls-nav__overlay" aria-hidden="true"></div>
  <div class="ls-nav__inner">
    <img class="ls-nav__logo"
      src="https://raw.githubusercontent.com/digitalmenteepro-cell/cartalimasur.cl/refs/heads/main/imagenes/Logo%20sin%20fondo.png"
      alt="Logo Lima Sur" loading="eager">
    <div class="ls-nav__center">
      <span class="ls-nav__badge">Carta Digital</span>
      <span class="ls-nav__title">Lima Sur</span>
    </div>
    <div class="ls-nav__pills">
      <a class="ls-nav__pill" href="#tenedor-libre">🍴 Tenedor Libre</a>
      <a class="ls-nav__pill" href="#platos-preparados">🍽 Platos Preparados</a>
      <a class="ls-nav__pill" href="#cocteles">🍹 Cócteles</a>
      <a class="ls-nav__pill" href="#bebidas">🥤 Bebidas</a>
      <a class="ls-nav__pill" href="#jugos">🍊 Jugos</a>
    </div>
  </div>
</nav>

<!-- LOGO FLOTANTE (scroll-to-top) -->
<button class="logo-sticky" id="logoSticky" aria-label="Volver al inicio" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <img src="https://raw.githubusercontent.com/digitalmenteepro-cell/cartalimasur.cl/refs/heads/main/imagenes/Logo%20sin%20fondo.png" alt="">
</button>

<script>
  const sticky = document.getElementById('logoSticky');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 300) {
      sticky.classList.add('visible');
    } else {
      sticky.classList.remove('visible');
    }
  }, { passive: true });
</script>
